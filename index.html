<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Instagram Focus</title>

  <script>
    const isStandalone = window.navigator.standalone;
  
    if (isStandalone) {
      // Open fast when launched from home screen
      window.location.href = "instagram://";
  
      setTimeout(() => {
        window.location.replace("https://www.instagram.com/?variant=following");
      }, 300);
    } else {
      // Delay when in Safari so you can install it
      setTimeout(() => {
        window.location.href = "instagram://";
  
        setTimeout(() => {
          window.location.replace("https://www.instagram.com/?variant=following");
        }, 800);
      }, 5000); // 5 seconds to let you tap "Add to Home Screen"
    }
  </script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system;
    }
  </style>
</head>

<body>
  Opening Instagram...
</body>
</html>
