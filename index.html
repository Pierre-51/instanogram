<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Instagram Focus</title>

  <script>
  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
  }

  if (isStandalone()) {
    window.location.replace("https://www.instagram.com/?variant=following");
  }
</script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: -apple-system;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #fff;
      color: #000;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div>
    <h2>Instagram Focus</h2>

    <p>Add this to your Home Screen 👇</p>
    <p><b>Share → "Add to Home Screen"</b></p>

    <button onclick="openInstagram()">
      Open Instagram
    </button>
  </div>
</body>
</html>
