<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Instagram Focus</title>

  <script>
  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
  }

  if (isStandalone()) {
    // Only auto-redirect when launched from home screen
    window.location.href = "instagram://";

    setTimeout(() => {
      window.location.replace("https://www.instagram.com/?variant=following");
    }, 300);
  }
</script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system;
    }
  </style>
</head>

<body>
  <body>
  <div>
    <p>Add this to your Home Screen 👇</p>
    <p>Share → "Add to Home Screen"</p>
  </div>
</body>
</body>
</html>
